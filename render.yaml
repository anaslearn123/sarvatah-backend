services:
  - type: web
    name: sarvatah-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: sarvatah-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: sarvatah-db
    plan: free
